<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starfleet Tactical PADD - Mk V</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --lcars-orange: #f90; --lcars-gold: #fc0; --lcars-violet: #c9c;
            --lcars-blue: #9cf; --lcars-red: #c33; --lcars-sand: #fca;
            --bg-black: #000;
        }

        @font-face {
            font-family: 'Antonio';
            src: url('https://fonts.cdnfonts.com/s/14353/Antonio-Bold.woff') format('woff');
        }

        html, body { 
            height: 100%; margin: 0; background: var(--bg-black); 
            font-family: 'Antonio', sans-serif; color: var(--lcars-gold);
            text-transform: uppercase; overflow-x: hidden;
        }

        /* Responsive LCARS Grid */
        .main-frame {
            display: grid;
            grid-template-columns: 100px 1fr; /* Narrower sidebar for mobile */
            grid-template-rows: auto 1fr auto auto;
            min-height: 100vh;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Desktop Layout (Wide screens) */
        @media (min-width: 768px) {
            .main-frame {
                grid-template-columns: 140px 1fr 220px;
                grid-template-rows: 60px 1fr 140px;
            }
            footer { grid-column: 2 / 4; }
        }

        /* Sidebar / Elbow */
        .nav-section { grid-row: 1 / 5; display: flex; flex-direction: column; gap: 4px; }
        .elbow {
            height: 80px; width: 100%;
            border-top: 20px solid var(--lcars-violet);
            border-left: 25px solid var(--lcars-violet);
            border-top-left-radius: 50px;
            box-sizing: border-box;
        }
        
        .nav-pill { height: 30px; background: var(--lcars-blue); position: relative; }
        .nav-pill.orange { background: var(--lcars-orange); }
        .nav-pill.sand { flex-grow: 1; border-bottom-left-radius: 50px; background: var(--lcars-sand); }

        header { 
            grid-column: 2; display: flex; flex-direction: column;
            border-bottom: 15px solid var(--lcars-violet); 
            padding-bottom: 5px;
        }

        @media (min-width: 768px) {
            header { grid-column: 2 / 4; flex-direction: row; justify-content: space-between; align-items: flex-end; }
        }

        /* Tactical Center */
        #map { 
            grid-column: 2; 
            height: 350px; /* Force visibility on mobile */
            border: 2px solid var(--lcars-blue); 
            background: #020202;
            border-radius: 5px;
        }

        @media (min-width: 768px) { #map { height: auto; } }

        /* Telemetry Column */
        .sensor-readout {
            grid-column: 2; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: rgba(15,15,15,0.8); border-left: 4px solid var(--lcars-sand);
            padding: 10px; font-size: 0.9rem;
        }

        @media (min-width: 768px) {
            .sensor-readout { grid-column: 3; grid-template-columns: 1fr; align-content: start; }
        }

        .data-box { border-bottom: 1px solid #333; padding-bottom: 5px; }
        .data-label { color: var(--lcars-blue); font-size: 0.65rem; display: block; }
        .data-value { font-size: 1.2rem; display: block; }

        /* Footer Controls */
        footer { grid-column: 2; display: flex; flex-direction: column; gap: 10px; }
        
        #console {
            height: 60px; background: #080808; border-top: 2px solid var(--lcars-orange);
            font-family: monospace; font-size: 0.7rem; padding: 8px; overflow-y: auto; color: #0f0;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button {
            border: none; padding: 15px 10px; font-family: inherit; font-weight: bold;
            font-size: 0.9rem; border-radius: 20px 5px 5px 20px; cursor: pointer;
            color: #000; text-align: center;
        }
        .btn-start { background: var(--lcars-gold); }
        .btn-stop { background: var(--lcars-orange); }
        .btn-util { background: var(--lcars-violet); border-radius: 5px 20px 20px 5px; }

    </style>
</head>
<body>

    <div class="main-frame">
        <div class="nav-section">
            <div class="elbow"></div>
            <div class="nav-pill">07-2104</div>
            <div class="nav-pill orange">SEC-01</div>
            <div class="nav-pill">NAV-A</div>
            <div class="nav-pill sand"></div>
        </div>

        <header>
            <div style="font-size: 1.4rem;">Tactical Navigation</div>
            <div id="stardate" style="font-size: 0.9rem; color: var(--lcars-blue);">STARDATE 177241.2</div>
        </header>

        <div id="map"></div>

        <div class="sensor-readout">
            <div class="data-box"><span class="data-label">Velocity</span><span class="data-value" id="vel-val">0.0 M/S</span></div>
            <div class="data-box"><span class="data-label">Heading</span><span class="data-value" id="head-val">000&deg;</span></div>
            <div class="data-box"><span class="data-label">Distance</span><span class="data-value" id="dist-val">0.00 KM</span></div>
            <div class="data-box"><span class="data-label">Accuracy</span><span class="data-value" id="acc-val">NOMINAL</span></div>
        </div>

        <footer>
            <div id="console">> SCANNER READY.</div>
            <div class="btn-grid">
                <button class="btn-start" id="start-btn" onclick="toggleSensors(true)">ENGAGE</button>
                <button class="btn-util" onclick="saveData()">EXPORT</button>
                <button class="btn-stop" id="stop-btn" onclick="toggleSensors(false)" disabled>HALT</button>
                <button class="btn-util" onclick="clearBuffer()">WIPE</button>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, polyline, shipMarker, watchId = null;
        let logs = JSON.parse(localStorage.getItem('trek_nav_data')) || [];
        
        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            polyline = L.polyline(logs.map(l => [l.lat, l.lng]), { color: '#9cf', weight: 3 }).addTo(map);
            shipMarker = L.circleMarker([0,0], { radius: 8, color: '#fc0', fillColor: '#fc0', fillOpacity: 0.9 }).addTo(map);
            if(logs.length > 0) map.setView([logs[logs.length-1].lat, logs[logs.length-1].lng], 14);
        }

        function toggleSensors(state) {
            if(state) {
                watchId = navigator.geolocation.watchPosition(updatePosition, null, { enableHighAccuracy: true });
                document.getElementById('start-btn').disabled = true;
                document.getElementById('stop-btn').disabled = false;
            } else {
                navigator.geolocation.clearWatch(watchId);
                document.getElementById('start-btn').disabled = false;
                document.getElementById('stop-btn').disabled = true;
            }
        }

        function updatePosition(pos) {
            const { latitude: lat, longitude: lng, speed, heading } = pos.coords;
            const latLng = [lat, lng];
            logs.push({lat, lng, time: Date.now()});
            localStorage.setItem('trek_nav_data', JSON.stringify(logs));
            
            shipMarker.setLatLng(latLng);
            polyline.addLatLng(latLng);
            map.panTo(latLng);
            
            document.getElementById('vel-val').innerText = `${(speed || 0).toFixed(1)} M/S`;
            document.getElementById('head-val').innerText = `${Math.round(heading || 0)}&deg;`;
        }

        function saveData() { /* same as before */ }
        function clearBuffer() { localStorage.removeItem('trek_nav_data'); location.reload(); }

        window.onload = init;
    </script>
</body>
</html>
