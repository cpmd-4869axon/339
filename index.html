<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tactical PADD Mk IX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --lcars-orange: #f90; --lcars-gold: #fc0; --lcars-violet: #c9c;
            --lcars-blue: #9cf; --lcars-red: #c33; --lcars-sand: #fca;
            --bg-black: #000;
        }

        @font-face {
            font-family: 'Antonio';
            src: url('https://fonts.cdnfonts.com/s/14353/Antonio-Bold.woff') format('woff');
        }

        html, body { 
            height: 100%; margin: 0; background: var(--bg-black); 
            font-family: 'Antonio', sans-serif; color: var(--lcars-gold);
            text-transform: uppercase; overflow: hidden;
            user-select: none; touch-action: manipulation;
        }

        /* Fixed Ratio Grid to prevent Map Squashing */
        .main-frame {
            display: grid;
            grid-template-columns: 75px 1fr;
            grid-template-rows: 45px 1fr auto 50px auto;
            height: 100vh; height: -webkit-fill-available;
            gap: 5px; padding: 10px; box-sizing: border-box;
        }

        /* Sidebar Architecture */
        .nav-section { grid-row: 1 / 6; display: flex; flex-direction: column; gap: 4px; }
        .elbow {
            height: 55px; width: 100%;
            border-top: 14px solid var(--lcars-violet);
            border-left: 18px solid var(--lcars-violet);
            border-top-left-radius: 35px;
        }
        .nav-pill { height: 32px; background: var(--lcars-blue); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #000; font-weight: bold; }
        .nav-pill.orange { background: var(--lcars-orange); }
        .nav-pill.sand { flex-grow: 1; border-bottom-left-radius: 35px; background: var(--lcars-sand); }

        header { 
            grid-column: 2; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 10px solid var(--lcars-violet);
        }

        #map { 
            grid-column: 2; border: 1px solid var(--lcars-blue); 
            background: #020202; border-radius: 2px;
            min-height: 200px; /* Prevents sliver map */
        }

        .sensor-readout {
            grid-column: 2; display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
            background: rgba(15,15,15,0.9); border-left: 5px solid var(--lcars-sand);
            padding: 8px;
        }
        .data-box { border-bottom: 1px solid #333; height: 35px; }
        .data-label { color: var(--lcars-blue); font-size: 0.55rem; display: block; }
        .data-value { font-size: 1.1rem; display: block; }

        footer { grid-column: 2; display: flex; flex-direction: column; gap: 4px; }
        #console {
            height: 40px; background: #000; border: 1px solid var(--lcars-orange);
            font-family: monospace; font-size: 0.6rem; padding: 4px; color: #0f0; overflow: hidden;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        button {
            border: none; padding: 12px 0; font-family: inherit; font-weight: bold;
            font-size: 1rem; border-radius: 20px 4px 4px 20px; cursor: pointer;
            color: #000; background: var(--lcars-gold);
        }
        .btn-stop { background: var(--lcars-orange); }
        .btn-util { background: var(--lcars-violet); border-radius: 4px 20px 20px 4px; }

        .red-alert { animation: red-flash 1s infinite; }
        @keyframes red-flash { 50% { background: rgba(255, 0, 0, 0.15); } }
    </style>
</head>
<body id="hull">

    <div class="main-frame">
        <nav class="nav-section">
            <div class="elbow"></div>
            <div class="nav-pill">07-2104</div>
            <div class="nav-pill orange" id="status-pill">STBY</div>
            <div class="nav-pill sand"></div>
        </nav>

        <header>
            <div style="font-size: 1.2rem;">Tactical Navigation</div>
            <div id="stardate" style="font-size: 0.7rem; color: var(--lcars-blue);">SD 177241.2</div>
        </header>

        <div id="map"></div>

        <section class="sensor-readout">
            <div class="data-box"><span class="data-label">IMPULSE</span><span class="data-value" id="vel-val">0.0 M/S</span></div>
            <div class="data-box"><span class="data-label">BEARING</span><span class="data-value" id="head-val">000&deg;</span></div>
            <div class="data-box"><span class="data-label">SECTOR DIST</span><span class="data-value" id="dist-val">0.00 KM</span></div>
            <div class="data-box"><span class="data-label">SENSORS</span><span class="data-value" id="acc-val">NOMINAL</span></div>
        </section>

        <div id="console">> TRICORDER READY...</div>

        <footer>
            <div class="btn-grid">
                <button id="start-btn" onclick="toggleTracking(true)">ENGAGE</button>
                <button class="btn-util" onclick="downloadLogs()">DOWNLOAD</button>
                <button class="btn-stop" id="stop-btn" onclick="toggleTracking(false)" disabled>HALT</button>
                <button class="btn-util" onclick="purgeMemory()">PURGE</button>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, polyline, shipMarker, trackingInterval = null;
        let logs = JSON.parse(localStorage.getItem('trek_nav_data')) || [];
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, d) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.frequency.value = f; g.gain.value = 0.05;
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.stop(audioCtx.currentTime + d);
        }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            polyline = L.polyline(logs.map(l => [l.lat, l.lng]), { color: '#9cf', weight: 3 }).addTo(map);
            shipMarker = L.circleMarker([0,0], { radius: 6, color: '#fc0', fillColor: '#fc0', fillOpacity: 1 }).addTo(map);
            
            if(logs.length > 0) {
                map.setView([logs[logs.length-1].lat, logs[logs.length-1].lng], 16);
                updateDisplay();
            }
        }

        function toggleTracking(state) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            beep(state ? 880 : 440, 0.1);

            if(state) {
                // Fixed Logic: Warm up the sensor to prevent Failure Code 3
                log("SENSORS WARMING UP...");
                trackingInterval = setInterval(() => {
                    navigator.geolocation.getCurrentPosition(processPosition, (e) => {
                        log(`ERROR CODE: ${e.code}`); // Failure 3 = Timeout
                    }, { 
                        enableHighAccuracy: true, 
                        timeout: 5000, // Increased timeout for better stability
                        maximumAge: 0 
                    });
                }, 1000);

                document.getElementById('start-btn').disabled = true;
                document.getElementById('stop-btn').disabled = false;
                document.getElementById('status-pill').innerText = "LOCK";
            } else {
                clearInterval(trackingInterval);
                document.getElementById('start-btn').disabled = false;
                document.getElementById('stop-btn').disabled = true;
                document.getElementById('status-pill').innerText = "STBY";
                document.getElementById('hull').classList.remove('red-alert');
            }
        }

        function processPosition(pos) {
            const { latitude: lat, longitude: lng, speed, heading, accuracy } = pos.coords;
            logs.push({lat, lng, time: Date.now()});
            if(logs.length > 2000) logs.shift();
            localStorage.setItem('trek_nav_data', JSON.stringify(logs));
            
            const latLng = [lat, lng];
            shipMarker.setLatLng(latLng);
            polyline.addLatLng(latLng);
            map.panTo(latLng);

            document.getElementById('vel-val').innerText = `${(speed || 0).toFixed(1)} M/S`;
            document.getElementById('head-val').innerText = `${Math.round(heading || 0).toString().padStart(3, '0')}&deg;`;
            
            const accField = document.getElementById('acc-val');
            if (accuracy > 30) {
                accField.innerText = "DEGRADED";
                document.getElementById('hull').classList.add('red-alert');
            } else {
                accField.innerText = "NOMINAL";
                document.getElementById('hull').classList.remove('red-alert');
            }
            updateDisplay();
            log(`LOCK: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
        }

        function updateDisplay() {
            let dist = 0;
            for(let i=1; i<logs.length; i++) {
                dist += L.latLng(logs[i-1].lat, logs[i-1].lng).distanceTo(L.latLng(logs[i].lat, logs[i].lng));
            }
            document.getElementById('dist-val').innerText = `${(dist/1000).toFixed(2)} KM`;
        }

        function log(msg) { document.getElementById('console').innerText = `> ${msg}`; }

        function purgeMemory() {
            if(confirm("PURGE DATA?")) { localStorage.clear(); location.reload(); }
        }

        function downloadLogs() {
            const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(logs));
            const a = document.createElement('a'); a.href = data; a.download = `LOG_${Date.now()}.json`; a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
